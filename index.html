<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>光の森 — VR散歩</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #060a18; font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif; }
  #overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    background: rgba(4, 7, 18, 0.72); color: #cfe3ff; z-index: 10;
    transition: opacity 0.8s ease; backdrop-filter: blur(2px);
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay h1 { font-size: 2.2em; margin: 0 0 8px; font-weight: 300; letter-spacing: 0.25em; text-shadow: 0 0 24px #4fc3f7; }
  #overlay p { max-width: 520px; line-height: 1.9; font-size: 0.95em; margin: 6px 20px; color: #9fb8d8; }
  .btn {
    margin-top: 18px; padding: 14px 44px; font-size: 1.05em; letter-spacing: 0.15em;
    color: #eaf4ff; background: rgba(79, 195, 247, 0.14); border: 1px solid #4fc3f7;
    border-radius: 999px; cursor: pointer; transition: all 0.25s;
  }
  .btn:hover { background: rgba(79, 195, 247, 0.35); box-shadow: 0 0 24px rgba(79,195,247,0.5); }
  .btn:disabled { opacity: 0.35; cursor: default; box-shadow: none; }
  #hud {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    color: rgba(180, 210, 240, 0.55); font-size: 12px; z-index: 5;
    pointer-events: none; letter-spacing: 0.08em; text-align: center;
  }
  #soundBtn {
    position: fixed; top: 14px; right: 14px; z-index: 6;
    background: rgba(10, 18, 40, 0.6); color: #9fb8d8; border: 1px solid rgba(120,160,220,0.35);
    border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 13px;
  }
</style>
</head>
<body>
<div id="overlay">
  <h1>光 の 森</h1>
  <p>夜の森を、ただ静かに散歩するVR体験です。<br>蛍の光、輝くキノコ、湖に映る月 — 急ぐ必要はどこにもありません。</p>
  <p>
    <b>VRヘッドセット</b>：左スティックで移動 / 右スティックで方向転換<br>
    <b>パソコン</b>：クリックで視点操作開始、WASDで移動、Shiftで早歩き<br>
    <b>スマホ</b>：ドラッグで見回し、画面長押しで前進
  </p>
  <div>
    <button class="btn" id="startBtn">森 へ 入 る</button>
    <button class="btn" id="vrBtn" disabled>VRで入る</button>
  </div>
</div>
<button id="soundBtn" style="display:none">🔇 音</button>
<div id="hud" style="display:none">WASD：移動　Shift：早歩き　ESC：マウス解放</div>

<script type="module">
// three.js を複数CDNのフォールバック付きで読み込む
let THREE = null;
for (const url of [
  'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js',
  'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.min.js',
  'https://unpkg.com/three@0.160.0/build/three.module.min.js'
]) {
  try { THREE = await import(url); break; } catch (e) { console.warn('CDN読み込み失敗:', url); }
}
if (!THREE) {
  document.getElementById('overlay').innerHTML =
    '<h1>読み込みエラー</h1><p>Three.jsライブラリを読み込めませんでした。<br>インターネット接続を確認して、ページを再読み込みしてください。</p>';
  throw new Error('three.js を読み込めませんでした');
}

// ---------- 基本セットアップ ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060a18);
scene.fog = new THREE.FogExp2(0x0a1228, 0.018);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.05, 900);
const rig = new THREE.Group();           // プレイヤーリグ（VR/デスクトップ共通）
rig.add(camera);
scene.add(rig);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.xr.enabled = true;
renderer.xr.setReferenceSpaceType('local-floor');
document.body.appendChild(renderer.domElement);

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---------- 地形 ----------
const LAKE = new THREE.Vector2(22, -18);
function terrainH(x, z) {
  let h = 0.9 * Math.sin(x*0.05) * Math.cos(z*0.06)
        + 0.45 * Math.sin(x*0.13 + z*0.09)
        + 0.25 * Math.cos(x*0.21 - z*0.17);
  const d2 = (x-LAKE.x)*(x-LAKE.x) + (z-LAKE.y)*(z-LAKE.y);
  h -= 1.8 * Math.exp(-d2 / (2*9*9));   // 湖のくぼみ
  return h;
}
const WATER_Y = -0.55;

{
  const g = new THREE.PlaneGeometry(260, 260, 110, 110);
  g.rotateX(-Math.PI/2);
  const p = g.attributes.position;
  for (let i = 0; i < p.count; i++) {
    p.setY(i, terrainH(p.getX(i), p.getZ(i)));
  }
  g.computeVertexNormals();
  const ground = new THREE.Mesh(g, new THREE.MeshStandardMaterial({ color: 0x11301f, roughness: 1 }));
  ground.receiveShadow = false;
  scene.add(ground);
}

// 湖
{
  const water = new THREE.Mesh(
    new THREE.CircleGeometry(13, 48).rotateX(-Math.PI/2),
    new THREE.MeshStandardMaterial({ color: 0x123a6b, emissive: 0x0a2450, roughness: 0.15, metalness: 0.6, transparent: true, opacity: 0.85 })
  );
  water.position.set(LAKE.x, WATER_Y, LAKE.y);
  scene.add(water);
}

// ---------- 空 ----------
{ // 星
  const n = 1600, pos = new Float32Array(n*3);
  for (let i = 0; i < n; i++) {
    const t = Math.random()*Math.PI*2, u = Math.random()*0.95 + 0.05;
    const r = 420;
    pos[i*3]   = r * Math.cos(t) * Math.sqrt(1-u*u);
    pos[i*3+1] = r * u;
    pos[i*3+2] = r * Math.sin(t) * Math.sqrt(1-u*u);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0xbdd7ff, size: 1.6, sizeAttenuation: false, fog: false })));
}
{ // 月
  const moon = new THREE.Mesh(new THREE.SphereGeometry(14, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0xf5f0d8, fog: false }));
  moon.position.set(120, 95, -180);
  scene.add(moon);
  const glow = new THREE.Sprite(new THREE.SpriteMaterial({
    map: makeGlowTexture('#fff7d9'), transparent: true, opacity: 0.55, fog: false, depthWrite: false
  }));
  glow.scale.setScalar(90);
  glow.position.copy(moon.position);
  scene.add(glow);
}

function makeGlowTexture(color) {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const gr = ctx.createRadialGradient(64,64,0,64,64,64);
  gr.addColorStop(0, color); gr.addColorStop(0.35, color + 'aa'); gr.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gr; ctx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}

// ---------- 光 ----------
scene.add(new THREE.HemisphereLight(0x3a5a9f, 0x0c1a12, 0.55));
{
  const moonLight = new THREE.DirectionalLight(0xa8c4ff, 0.65);
  moonLight.position.set(120, 95, -180);
  scene.add(moonLight);
}

// ---------- 森 ----------
const rand = (a,b) => a + Math.random()*(b-a);
function placeOK(x, z) {
  const dLake = Math.hypot(x-LAKE.x, z-LAKE.y);
  const dCenter = Math.hypot(x, z);
  return dLake > 16 && dCenter > 4 && dCenter < 115;
}

{ // 木
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x2b2019, roughness: 1 });
  const leafMats = [0x14402a, 0x0f4d33, 0x1a3d4d].map(c => new THREE.MeshStandardMaterial({ color: c, roughness: 1 }));
  for (let i = 0; i < 70; i++) {
    let x, z, tries = 0;
    do { x = rand(-110,110); z = rand(-110,110); } while (!placeOK(x,z) && ++tries < 40);
    if (tries >= 40) continue;
    const y = terrainH(x,z);
    const h = rand(3.5, 7);
    const tree = new THREE.Group();
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.28, h, 7), trunkMat);
    trunk.position.y = h/2;
    tree.add(trunk);
    const nLeaf = 2 + (Math.random()*2|0);
    for (let j = 0; j < nLeaf; j++) {
      const r = rand(1.1, 2.2);
      const leaf = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 6), leafMats[(Math.random()*leafMats.length)|0]);
      leaf.position.set(rand(-0.7,0.7), h - j*r*0.55, rand(-0.7,0.7));
      leaf.scale.y = 0.8;
      tree.add(leaf);
    }
    tree.position.set(x, y, z);
    scene.add(tree);
  }
}

{ // 光るキノコ
  const capColors = [0x4fc3f7, 0xff7ab8, 0x7dffb0, 0xc59bff];
  for (let i = 0; i < 34; i++) {
    let x, z, tries = 0;
    do { x = rand(-90,90); z = rand(-90,90); } while (!placeOK(x,z) && ++tries < 40);
    if (tries >= 40) continue;
    const y = terrainH(x,z);
    const col = capColors[(Math.random()*capColors.length)|0];
    const s = rand(0.12, 0.4);
    const m = new THREE.Group();
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(s*0.28, s*0.4, s*1.6, 6),
      new THREE.MeshStandardMaterial({ color: 0xddd8c8, emissive: 0x333026, roughness: 0.9 }));
    stem.position.y = s*0.8;
    const cap = new THREE.Mesh(new THREE.SphereGeometry(s, 10, 8, 0, Math.PI*2, 0, Math.PI/2),
      new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 1.6, roughness: 0.4 }));
    cap.position.y = s*1.55;
    m.add(stem, cap);
    m.position.set(x, y, z);
    scene.add(m);
    if (i < 7) { // 数個だけ実光源
      const l = new THREE.PointLight(col, 2.2, 7, 2);
      l.position.set(x, y + s*2, z);
      scene.add(l);
    }
  }
}

const crystals = [];
{ // クリスタル
  for (let i = 0; i < 12; i++) {
    let x, z, tries = 0;
    do { x = rand(-80,80); z = rand(-80,80); } while (!placeOK(x,z) && ++tries < 40);
    if (tries >= 40) continue;
    const y = terrainH(x,z);
    const s = rand(0.4, 1.3);
    const crystal = new THREE.Mesh(new THREE.OctahedronGeometry(s),
      new THREE.MeshStandardMaterial({ color: 0x9b7dff, emissive: 0x6a3df0, emissiveIntensity: 1.1, roughness: 0.1, metalness: 0.2, transparent: true, opacity: 0.9 }));
    crystal.position.set(x, y + s*0.7, z);
    crystal.rotation.set(rand(0,0.5), rand(0,Math.PI), rand(0,0.5));
    crystal.userData.spin = rand(0.1, 0.35);
    crystal.userData.baseY = y + s*0.7;
    crystal.userData.phase = rand(0, Math.PI*2);
    crystals.push(crystal);
    scene.add(crystal);
  }
}

// ---------- 蛍 ----------
const FIREFLY_N = 220;
const fireflyGeo = new THREE.BufferGeometry();
const fireflyPos = new Float32Array(FIREFLY_N*3);
const fireflySeed = [];
for (let i = 0; i < FIREFLY_N; i++) {
  const x = rand(-100,100), z = rand(-100,100);
  fireflyPos[i*3] = x;
  fireflyPos[i*3+1] = terrainH(x,z) + rand(0.4, 3.2);
  fireflyPos[i*3+2] = z;
  fireflySeed.push({ x, z, p: rand(0, Math.PI*2), r: rand(0.5, 3), s: rand(0.2, 0.7) });
}
fireflyGeo.setAttribute('position', new THREE.BufferAttribute(fireflyPos, 3));
const fireflies = new THREE.Points(fireflyGeo, new THREE.PointsMaterial({
  color: 0xbfff6e, size: 0.14, transparent: true, opacity: 0.95,
  blending: THREE.AdditiveBlending, depthWrite: false
}));
scene.add(fireflies);

// ---------- 移動 ----------
let yaw = 0, pitch = 0;
const keys = {};
addEventListener('keydown', e => keys[e.code] = true);
addEventListener('keyup', e => keys[e.code] = false);

const canvas = renderer.domElement;
let pointerLocked = false;
canvas.addEventListener('click', () => {
  if (!renderer.xr.isPresenting && !('ontouchstart' in window)) canvas.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => pointerLocked = document.pointerLockElement === canvas);
addEventListener('mousemove', e => {
  if (!pointerLocked) return;
  yaw   -= e.movementX * 0.0022;
  pitch -= e.movementY * 0.0022;
  pitch = Math.max(-1.35, Math.min(1.35, pitch));
});

// スマホ: ドラッグで見回し、長押しで前進
let touchPrev = null, touchMove = false, touchTimer = null;
canvas.addEventListener('touchstart', e => {
  touchPrev = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  touchTimer = setTimeout(() => touchMove = true, 350);
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (!touchPrev) return;
  const t = e.touches[0];
  const dx = t.clientX - touchPrev.x, dy = t.clientY - touchPrev.y;
  if (Math.abs(dx) + Math.abs(dy) > 6) { clearTimeout(touchTimer); }
  yaw -= dx * 0.005; pitch -= dy * 0.005;
  pitch = Math.max(-1.35, Math.min(1.35, pitch));
  touchPrev = { x: t.clientX, y: t.clientY };
}, { passive: true });
canvas.addEventListener('touchend', () => { touchPrev = null; touchMove = false; clearTimeout(touchTimer); });

// VRコントローラー
let snapReady = true;
function xrMove(dt) {
  const session = renderer.xr.getSession();
  if (!session) return;
  for (const src of session.inputSources) {
    if (!src.gamepad) continue;
    const ax = src.gamepad.axes;
    // スティック軸 (2,3) が標準。無ければ (0,1)
    const sx = ax[2] !== undefined ? ax[2] : ax[0] || 0;
    const sy = ax[3] !== undefined ? ax[3] : ax[1] || 0;
    if (src.handedness === 'left') {
      if (Math.abs(sx) > 0.15 || Math.abs(sy) > 0.15) {
        // ヘッドセットの向き基準で移動
        const q = new THREE.Quaternion();
        renderer.xr.getCamera().getWorldQuaternion(q);
        const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(q); fwd.y = 0; fwd.normalize();
        const right = new THREE.Vector3(1,0,0).applyQuaternion(q); right.y = 0; right.normalize();
        rig.position.addScaledVector(fwd, -sy * 2.2 * dt);
        rig.position.addScaledVector(right, sx * 2.2 * dt);
      }
    } else if (src.handedness === 'right') {
      if (Math.abs(sx) > 0.6 && snapReady) {
        rig.rotation.y -= Math.sign(sx) * Math.PI/6; // 30°スナップターン
        snapReady = false;
      } else if (Math.abs(sx) < 0.3) {
        snapReady = true;
      }
    }
  }
}

function desktopMove(dt) {
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;
  const speed = (keys['ShiftLeft'] || keys['ShiftRight']) ? 5.2 : 2.4;
  const fwd = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
  let mv = new THREE.Vector3();
  if (keys['KeyW'] || keys['ArrowUp'] || touchMove) mv.add(fwd);
  if (keys['KeyS'] || keys['ArrowDown']) mv.sub(fwd);
  if (keys['KeyA'] || keys['ArrowLeft']) mv.sub(right);
  if (keys['KeyD'] || keys['ArrowRight']) mv.add(right);
  if (mv.lengthSq() > 0) rig.position.addScaledVector(mv.normalize(), speed * dt);
}

function clampPlayer() {
  const d = Math.hypot(rig.position.x, rig.position.z);
  if (d > 112) rig.position.multiplyScalar(112/d);
  const h = Math.max(terrainH(rig.position.x, rig.position.z), WATER_Y + 0.15);
  rig.position.y = h;
}

// ---------- 環境音（WebAudio 生成） ----------
let audioCtx = null, audioOn = false, audioNodes = [];
function toggleAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    buildAmbience();
  }
  audioOn = !audioOn;
  audioCtx.resume();
  audioNodes.forEach(n => n.gain.gain.setTargetAtTime(audioOn ? n.level : 0, audioCtx.currentTime, 0.8));
  soundBtn.textContent = audioOn ? '🔊 音' : '🔇 音';
}
function buildAmbience() {
  const master = audioCtx.createGain();
  master.gain.value = 0.5;
  master.connect(audioCtx.destination);
  // 風（フィルタ付きノイズ）
  const len = audioCtx.sampleRate * 4;
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random()*2 - 1;
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf; noise.loop = true;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 420; lp.Q.value = 0.4;
  const windGain = audioCtx.createGain(); windGain.gain.value = 0;
  noise.connect(lp).connect(windGain).connect(master);
  noise.start();
  audioNodes.push({ gain: windGain, level: 0.16 });
  // やわらかいパッド（5度のドローン）
  [110, 165, 220].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    o.type = 'sine'; o.frequency.value = f;
    const g = audioCtx.createGain(); g.gain.value = 0;
    const lfo = audioCtx.createOscillator();
    lfo.frequency.value = 0.06 + i*0.03;
    const lfoG = audioCtx.createGain(); lfoG.gain.value = 0.012;
    lfo.connect(lfoG).connect(g.gain);
    o.connect(g).connect(master);
    o.start(); lfo.start();
    audioNodes.push({ gain: g, level: 0.035 });
  });
}

// ---------- UI / 開始 ----------
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const vrBtn = document.getElementById('vrBtn');
const soundBtn = document.getElementById('soundBtn');
const hud = document.getElementById('hud');
soundBtn.addEventListener('click', toggleAudio);

function enterWorld() {
  overlay.classList.add('hidden');
  soundBtn.style.display = 'block';
  if (!('ontouchstart' in window)) hud.style.display = 'block';
}
startBtn.addEventListener('click', () => {
  enterWorld();
  if (!('ontouchstart' in window)) canvas.requestPointerLock();
});

// VRボタン（WebXR対応チェック）
if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-vr').then(ok => {
    if (!ok) return;
    vrBtn.disabled = false;
    vrBtn.addEventListener('click', async () => {
      try {
        const session = await navigator.xr.requestSession('immersive-vr', {
          optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking']
        });
        session.addEventListener('end', () => { overlay.classList.remove('hidden'); });
        await renderer.xr.setSession(session);
        enterWorld();
      } catch (e) { console.warn('VRセッション開始に失敗:', e); }
    });
  });
}

// ---------- メインループ ----------
rig.position.set(0, terrainH(0,0), 6);
camera.position.set(0, 1.6, 0);   // デスクトップ時の目線（VR時はデバイスが上書き）

const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  if (renderer.xr.isPresenting) xrMove(dt);
  else desktopMove(dt);
  clampPlayer();

  // 蛍のゆらぎ
  const p = fireflyGeo.attributes.position;
  for (let i = 0; i < FIREFLY_N; i++) {
    const s = fireflySeed[i];
    const a = t * s.s + s.p;
    const x = s.x + Math.cos(a) * s.r;
    const z = s.z + Math.sin(a*0.8) * s.r;
    p.setX(i, x);
    p.setZ(i, z);
    p.setY(i, terrainH(x,z) + 1.2 + Math.sin(a*1.7) * 0.8);
  }
  p.needsUpdate = true;
  fireflies.material.opacity = 0.65 + 0.3*Math.sin(t*2.1);

  // クリスタルの回転と浮遊
  for (const c of crystals) {
    c.rotation.y += c.userData.spin * dt;
    c.position.y = c.userData.baseY + Math.sin(t*0.7 + c.userData.phase) * 0.15;
  }

  renderer.render(scene, camera);
});
</script>
</body>
</html>
